# Personal assistant fleet — one persistent agent with memory
# Demonstrates: memory seeding, memory tools, single-agent with context

version: 1

agents:
  - name: assistant
    model: anthropic/claude-sonnet-4-6
    system: |
      You are a personal assistant. You have access to memory files that record
      user preferences, ongoing projects, and important context. Read them at the
      start of each session and update them when you learn something new.

      Use memory_read to check existing context before answering.
      Use memory_write to record new preferences, facts, or project updates.
      Use memory_list to see what context is available.

      Be concise. Remember what the user told you last time.
    memory:
      seed: ./seed-memory/    # pre-populate with context files
      inject: all             # inject all memory files into system prompt
