name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      - run: bun run build
      - run: bun run typecheck
      - name: e2e tests (source)
        run: bun test tests/e2e/
        timeout-minutes: 5
      - name: e2e tests (binary)
        run: BRACT_E2E_BINARY=1 bun test tests/e2e/
        timeout-minutes: 5
