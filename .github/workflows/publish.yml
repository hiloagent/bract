name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test

      - name: Build library packages
        run: |
          cd packages/runtime    && bun run build
          cd ../supervisor       && bun run build
          cd ../runner           && bun run build
          cd ../memory           && bun run build

      - name: Cross-compile CLI binaries
        run: |
          cd packages/cli
          bun build ./src/index.ts --compile --target=bun-linux-x64    --outfile ../cli-linux-x64/bract
          bun build ./src/index.ts --compile --target=bun-linux-arm64   --outfile ../cli-linux-arm64/bract
          bun build ./src/index.ts --compile --target=bun-darwin-x64    --outfile ../cli-darwin-x64/bract
          bun build ./src/index.ts --compile --target=bun-darwin-arm64  --outfile ../cli-darwin-arm64/bract
          bun build ./src/index.ts --compile --target=bun-windows-x64   --outfile ../cli-windows-x64/bract.exe

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" >> ~/.npmrc
          cd packages/runtime        && bun publish --access public
          cd ../supervisor           && bun publish --access public
          cd ../runner               && bun publish --access public
          cd ../memory               && bun publish --access public
          cd ../cli-linux-x64        && bun publish --access public
          cd ../cli-linux-arm64      && bun publish --access public
          cd ../cli-darwin-x64       && bun publish --access public
          cd ../cli-darwin-arm64     && bun publish --access public
          cd ../cli-windows-x64      && bun publish --access public
          cd ../cli                  && bun publish --access public
