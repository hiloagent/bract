name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      - name: Build packages
        run: |
          cd packages/runtime    && bun run build
          cd ../supervisor       && bun run build
          cd ../runner           && bun run build
      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          cd packages/runtime    && bun publish --access public
          cd ../supervisor       && bun publish --access public
          cd ../runner           && bun publish --access public
